apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickhire-frontend
  namespace: quickhire
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quickhire-frontend
  template:
    metadata:
      labels:
        app: quickhire-frontend
    spec:
      containers:
      - name: frontend
        image: your-registry/quickhire-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: frontend-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5