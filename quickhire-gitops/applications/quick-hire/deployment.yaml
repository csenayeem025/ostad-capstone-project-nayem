apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickhire-backend
  namespace: quickhire
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quickhire-backend
  template:
    metadata:
      labels:
        app: quickhire-backend
    spec:
      containers:
      - name: backend
        image: your-registry/quickhire-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongodb-uri
        envFrom:
        - configMapRef:
            name: backend-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5