[master]
master ansible_host=<MASTER_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/quickhire-key.pem

[workers]
worker1 ansible_host=<WORKER1_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/quickhire-key.pem
worker2 ansible_host=<WORKER2_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/quickhire-key.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3