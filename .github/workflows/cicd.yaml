name: Complete CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  BACKEND_DIR: "./quickhire-gitops/applications/quick-hire"
  FRONTEND_DIR: "./quickhire-gitops/applications/quick-hire-app"

jobs:
  # =======================
  # Job 1: Test Backend
  # =======================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
